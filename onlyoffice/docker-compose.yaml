services:
     onlyoffice:
       image: onlyoffice/documentserver:latest
       volumes:
       - ./data:/var/www/onlyoffice/Data
       environment:
       - JWT_ENABLED=true
       - JWT_SECRET=SecretKey
       - JWT_HEADER=Authorization
       - JWT_IN_BODY=true
       ports:
       - '8833:80'
       restart: unless-stopped
